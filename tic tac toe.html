<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
        }
        .board {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 5px;
            margin-bottom: 20px;
            background: #333;
            padding: 5px;
            border-radius: 5px;
        }
        .cell {
            width: 120px;
            height: 120px;
            background: white;
            border: none;
            font-size: 32px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .cell:hover {
            background: #f0f0f0;
        }
        .status {
            font-size: 20px;
            color: white;
            margin-bottom: 20px;
        }
        .ai-level {
            margin-bottom: 20px;
        }
        .ai-level select {
            padding: 5px;
            font-size: 16px;
        }
        .reset {
            padding: 10px 20px;
            font-size: 16px;
            background: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .reset:hover {
            background: #e0e0e0;
        }
        .back {
            padding: 10px 20px;
            font-size: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-left: 10px;
        }
        .back:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        <div class="status" id="status">Player X's Turn</div>
        <div class="ai-level">
            <label for="aiSelect" style="color: white; font-size: 18px;">AI Level: </label>
            <select id="aiSelect">
                <option value="1">Level 1 - Random</option>
                <option value="2">Level 2 - Beginner</option>
                <option value="3">Level 3 - Intermediate</option>
                <option value="4">Level 4 - Advanced</option>
                <option value="5">Level 5 - Expert</option>
            </select>
        </div>
        <div class="board" id="board">
            <button class="cell" data-index="0"></button>
            <button class="cell" data-index="1"></button>
            <button class="cell" data-index="2"></button>
            <button class="cell" data-index="3"></button>
            <button class="cell" data-index="4"></button>
            <button class="cell" data-index="5"></button>
            <button class="cell" data-index="6"></button>
            <button class="cell" data-index="7"></button>
            <button class="cell" data-index="8"></button>
        </div>
        <button class="reset" onclick="resetGame()">Reset Game</button>
        <button class="back" onclick="window.location.href='main.html'">Back to Main</button>
    </div>

    <script>
        let currentPlayer = 'X';
        let gameBoard = ['', '', '', '', '', '', '', '', ''];
        let aiLevel = 1;
        const winningConditions = [
            [0, 1, 2],
            [3, 4, 5],
            [6, 7, 8],
            [0, 3, 6],
            [1, 4, 7],
            [2, 5, 8],
            [0, 4, 8],
            [2, 4, 6]
        ];

        document.getElementById('aiSelect').addEventListener('change', function() {
            aiLevel = parseInt(this.value);
        });

        document.querySelectorAll('.cell').forEach(cell => {
            cell.addEventListener('click', handleCellClick);
        });

        function handleCellClick(e) {
            const index = e.target.dataset.index;
            if (gameBoard[index] !== '' || currentPlayer === 'O') return;
            
            gameBoard[index] = currentPlayer;
            e.target.textContent = currentPlayer;

            if (checkWin()) {
                document.getElementById('status').textContent = `Player ${currentPlayer} Wins!`;
                disableAllCells();
            } else if (gameBoard.every(cell => cell !== '')) {
                document.getElementById('status').textContent = "It's a Draw!";
            } else {
                currentPlayer = 'O';
                document.getElementById('status').textContent = `AI's Turn`;
                setTimeout(() => aiMove(), 500); // Delay for better UX
            }
        }

        function checkWin() {
            return winningConditions.some(condition => 
                gameBoard[condition[0]] === currentPlayer &&
                gameBoard[condition[1]] === currentPlayer &&
                gameBoard[condition[2]] === currentPlayer
            );
        }

        function disableAllCells() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.disabled = true;
            });
        }

        function resetGame() {
            currentPlayer = 'X';
            gameBoard = ['', '', '', '', '', '', '', '', ''];
            document.querySelectorAll('.cell').forEach(cell => {
                cell.textContent = '';
                cell.disabled = false;
            });
            document.getElementById('status').textContent = "Player X's Turn";
        }

        function aiMove() {
            let move;
            switch(aiLevel) {
                case 1:
                    move = aiRandom();
                    break;
                case 2:
                    move = aiBeginner();
                    break;
                case 3:
                    move = aiIntermediate();
                    break;
                case 4:
                    move = aiAdvanced();
                    break;
                case 5:
                    move = aiExpert();
                    break;
            }
            if (move !== undefined) {
                gameBoard[move] = 'O';
                document.querySelector(`[data-index="${move}"]`).textContent = 'O';
                
                if (checkWin()) {
                    document.getElementById('status').textContent = `AI Wins!`;
                    disableAllCells();
                } else if (gameBoard.every(cell => cell !== '')) {
                    document.getElementById('status').textContent = "It's a Draw!";
                } else {
                    currentPlayer = 'X';
                    document.getElementById('status').textContent = `Player X's Turn`;
                }
            }
        }

        function aiRandom() {
            const emptyCells = gameBoard.map((cell, index) => cell === '' ? index : null).filter(index => index !== null);
            return emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }

        function aiRandom() {
            const emptyCells = gameBoard.map((cell, index) => cell === '' ? index : null).filter(index => index !== null);
            return emptyCells[Math.floor(Math.random() * emptyCells.length)];
        }

        function aiBeginner() {
            // Check if player can win next turn
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (gameBoard[a] === 'X' && gameBoard[b] === 'X' && gameBoard[c] === '') return c;
                if (gameBoard[a] === 'X' && gameBoard[c] === 'X' && gameBoard[b] === '') return b;
                if (gameBoard[b] === 'X' && gameBoard[c] === 'X' && gameBoard[a] === '') return a;
            }
            // Else random
            return aiRandom();
        }

        function aiIntermediate() {
            // Check if AI can win
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (gameBoard[a] === 'O' && gameBoard[b] === 'O' && gameBoard[c] === '') return c;
                if (gameBoard[a] === 'O' && gameBoard[c] === 'O' && gameBoard[b] === '') return b;
                if (gameBoard[b] === 'O' && gameBoard[c] === 'O' && gameBoard[a] === '') return a;
            }
            // Check if player can win
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (gameBoard[a] === 'X' && gameBoard[b] === 'X' && gameBoard[c] === '') return c;
                if (gameBoard[a] === 'X' && gameBoard[c] === 'X' && gameBoard[b] === '') return b;
                if (gameBoard[b] === 'X' && gameBoard[c] === 'X' && gameBoard[a] === '') return a;
            }
            // Else random
            return aiRandom();
        }

        function checkWinner(board) {
            for (let condition of winningConditions) {
                const [a, b, c] = condition;
                if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                    return board[a];
                }
            }
            if (board.every(cell => cell !== '')) return 'draw';
            return null;
        }

        function evaluate(board) {
            const winner = checkWinner(board);
            if (winner === 'O') return 10;
            if (winner === 'X') return -10;
            return 0;
        }

        function minimax(board, depth, isMaximizing) {
            const winner = checkWinner(board);
            if (winner === 'O') return 10 - depth;
            if (winner === 'X') return -10 + depth;
            if (winner === 'draw') return 0;

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'O';
                        const eval = minimax(board, depth + 1, false);
                        board[i] = '';
                        maxEval = Math.max(maxEval, eval);
                    }
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let i = 0; i < 9; i++) {
                    if (board[i] === '') {
                        board[i] = 'X';
                        const eval = minimax(board, depth + 1, true);
                        board[i] = '';
                        minEval = Math.min(minEval, eval);
                    }
                }
                return minEval;
            }
        }

        function aiAdvanced() {
            let bestMove = -1;
            let bestValue = -Infinity;
            for (let i = 0; i < 9; i++) {
                if (gameBoard[i] === '') {
                    gameBoard[i] = 'O';
                    const moveValue = minimax(gameBoard, 0, false);
                    gameBoard[i] = '';
                    if (moveValue > bestValue) {
                        bestValue = moveValue;
                        bestMove = i;
                    }
                }
            }
            return bestMove;
        }

        function aiExpert() {
            let bestMove = -1;
            let bestValue = -Infinity;
            for (let i = 0; i < 9; i++) {
                if (gameBoard[i] === '') {
                    gameBoard[i] = 'O';
                    const moveValue = minimax(gameBoard, 0, false);
                    gameBoard[i] = '';
                    if (moveValue > bestValue) {
                        bestValue = moveValue;
                        bestMove = i;
                    }
                }
            }
            return bestMove;
        }
    </script>
</body>
</html>
