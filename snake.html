<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - 6 Game Modes</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        .container {
            text-align: center;
        }
        .menu {
            margin-bottom: 20px;
        }
        .menu button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .menu button:hover {
            background: linear-gradient(45deg, #45a049, #4CAF50);
            transform: translateY(-2px);
        }
        canvas {
            border: 2px solid #4CAF50;
            display: block;
            margin: 20px auto;
            background: #000;
        }
        #info {
            font-size: 18px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <div class="menu">
            <button onclick="window.location.href='main.html'">Back to Main</button>
            <button onclick="startGame('classic')">Classic</button>
            <button onclick="startGame('straight')">Straight</button>
            <button onclick="startGame('borderless')">Borderless</button>
            <button onclick="startGame('maze')">Maze</button>
            <button onclick="startGame('speed')">Speed</button>
            <button onclick="startGame('timed')">Timed</button>
        </div>
        <div id="info">Select a game mode to start</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const info = document.getElementById('info');

        let gameMode = '';
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let score = 0;
        let gameSpeed = 100;
        let gameActive = false;
        let timeLeft = 60;
        let gameTimer;
        let walls = [];

        const gridSize = 20;

        function startGame(mode) {
            gameMode = mode;
            snake = [{x: 10, y: 10}];
            food = generateFood();
            score = 0;
            gameActive = true;
            gameSpeed = 100;
            timeLeft = 60;
            walls = [];

            switch(mode) {
                case 'speed': gameSpeed = 50; break;
                case 'maze': generateMaze(); break;
                case 'straight': // Food will be generated in straight line
                    break;
                case 'borderless': // Wrap around
                    break;
                case 'timed': // 60 seconds
                    break;
            }

            document.addEventListener('keydown', handleInput);
            gameTimer = setInterval(gameLoop, gameSpeed);
        }

        function handleInput(e) {
            const key = e.key;
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
                e.preventDefault();
                const dir = {
                    'ArrowUp': {x: 0, y: -1},
                    'ArrowDown': {x: 0, y: 1},
                    'ArrowLeft': {x: -1, y: 0},
                    'ArrowRight': {x: 1, y: 0}
                }[key];
                moveSnake(dir);
            }
        }

        let direction = {x: 1, y: 0};
        let nextDir = {x: 1, y: 0};

        function moveSnake(dir) {
            if(dir.x + direction.x !== 0 || dir.y + direction.y !== 0) {
                nextDir = dir;
            }
        }

        function gameLoop() {
            direction = nextDir;
            let head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Handle borderless mode
            if (gameMode === 'borderless') {
                if (head.x < 0) head.x = (canvas.width / gridSize) - 1;
                if (head.x >= canvas.width / gridSize) head.x = 0;
                if (head.y < 0) head.y = (canvas.height / gridSize) - 1;
                if (head.y >= canvas.height / gridSize) head.y = 0;
            }

            if (checkCollision(head)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                if (gameMode === 'straight') {
                    food = generateFoodStraight();
                } else {
                    food = generateFood();
                }
            } else {
                snake.pop();
            }

            if (gameMode === 'timed') {
                timeLeft -= gameSpeed / 1000;
                if (timeLeft <= 0) endGame();
            }

            draw();
        }

        function checkCollision(head) {
            // Check walls
            if (walls.some(w => w.x === head.x && w.y === head.y)) return true;

            // Check boundaries unless borderless
            if (gameMode !== 'borderless') {
                if (head.x < 0 || head.x >= canvas.width / gridSize ||
                    head.y < 0 || head.y >= canvas.height / gridSize) return true;
            }

            // Check self collision
            return snake.some(s => s.x === head.x && s.y === head.y);
        }

        function generateFood() {
            let newFood;
            do {
                newFood = {
                    x: Math.floor(Math.random() * (canvas.width / gridSize)),
                    y: Math.floor(Math.random() * (canvas.height / gridSize))
                };
            } while (snake.some(s => s.x === newFood.x && s.y === newFood.y) ||
                     walls.some(w => w.x === newFood.x && w.y === newFood.y));
            return newFood;
        }

        function generateFoodStraight() {
            let newFood;
            do {
                // Generate food in the direction of movement
                newFood = {
                    x: snake[0].x + direction.x * (Math.floor(Math.random() * 5) + 1),
                    y: snake[0].y + direction.y * (Math.floor(Math.random() * 5) + 1)
                };
                // Wrap around if borderless
                if (gameMode === 'borderless') {
                    newFood.x = (newFood.x + (canvas.width / gridSize)) % (canvas.width / gridSize);
                    newFood.y = (newFood.y + (canvas.height / gridSize)) % (canvas.height / gridSize);
                } else {
                    // Keep within bounds
                    newFood.x = Math.max(0, Math.min(newFood.x, (canvas.width / gridSize) - 1));
                    newFood.y = Math.max(0, Math.min(newFood.y, (canvas.height / gridSize) - 1));
                }
            } while (snake.some(s => s.x === newFood.x && s.y === newFood.y) ||
                     walls.some(w => w.x === newFood.x && w.y === newFood.y));
            return newFood;
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw walls
            ctx.fillStyle = '#666';
            walls.forEach(w => {
                ctx.fillRect(w.x * gridSize, w.y * gridSize, gridSize, gridSize);
            });

            // Draw snake with gradient
            snake.forEach((s, i) => {
                if (i === 0) {
                    // Head with eyes
                    const gradient = ctx.createLinearGradient(s.x * gridSize, s.y * gridSize, (s.x + 1) * gridSize, (s.y + 1) * gridSize);
                    gradient.addColorStop(0, '#4CAF50');
                    gradient.addColorStop(1, '#388E3C');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(s.x * gridSize + gridSize / 2, s.y * gridSize + gridSize / 2, gridSize / 2 - 1, 0, 2 * Math.PI);
                    ctx.fill();

                    // Eyes
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(s.x * gridSize + gridSize / 3, s.y * gridSize + gridSize / 3, 2, 0, 2 * Math.PI);
                    ctx.arc(s.x * gridSize + 2 * gridSize / 3, s.y * gridSize + gridSize / 3, 2, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(s.x * gridSize + gridSize / 3, s.y * gridSize + gridSize / 3, 1, 0, 2 * Math.PI);
                    ctx.arc(s.x * gridSize + 2 * gridSize / 3, s.y * gridSize + gridSize / 3, 1, 0, 2 * Math.PI);
                    ctx.fill();
                } else {
                    // Body
                    const gradient = ctx.createLinearGradient(s.x * gridSize, s.y * gridSize, (s.x + 1) * gridSize, (s.y + 1) * gridSize);
                    gradient.addColorStop(0, '#66BB6A');
                    gradient.addColorStop(1, '#43A047');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(s.x * gridSize + gridSize / 2, s.y * gridSize + gridSize / 2, gridSize / 2 - 1, 0, 2 * Math.PI);
                    ctx.fill();
                }
            });

            // Draw food with glow
            const foodGradient = ctx.createRadialGradient(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, 0, food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2);
            foodGradient.addColorStop(0, '#FF5722');
            foodGradient.addColorStop(1, '#D84315');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 1, 0, 2 * Math.PI);
            ctx.fill();

            // Shadow for food
            ctx.shadowColor = '#FF5722';
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;

            info.innerText = `Mode: ${gameMode.charAt(0).toUpperCase() + gameMode.slice(1)} | Score: ${score}${gameMode === 'timed' ? ` | Time: ${timeLeft.toFixed(1)}s` : ''}`;
        }

        function generateMaze() {
            walls = [];
            // Simple maze: vertical walls
            for (let y = 0; y < canvas.height / gridSize; y++) {
                if (y % 3 === 0) {
                    walls.push({x: 5, y: y});
                    walls.push({x: 15, y: y});
                }
            }
            // Horizontal walls
            for (let x = 0; x < canvas.width / gridSize; x++) {
                if (x % 4 === 0) {
                    walls.push({x: x, y: 5});
                    walls.push({x: x, y: 15});
                }
            }
        }

        function endGame() {
            gameActive = false;
            clearInterval(gameTimer);
            info.innerText = `Game Over! Final Score: ${score}`;
        }

        draw();
    </script>
</body>
</html>
